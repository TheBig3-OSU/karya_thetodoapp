name: Protect Main Branch

on:
  push:
    branches:
      - main

jobs:
  block-direct-push:
    name: Block Direct Push to Main
    runs-on: ubuntu-latest
    steps:
      - name: Fail on direct push
        run: |
          echo "::error::Direct pushes to 'main' are not allowed."
          echo "::error::Please create a branch, open a Pull Request, and get it reviewed before merging."
          exit 1
